<!DOCTYPE html>
<html lang="pt-br">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avisos</title>
  <link rel="stylesheet" href="/playlists/style-playlists.css">
  <link rel="icon" type="image/png" href="https://www.ifsc.edu.br/o/ifsc-internet-lf6_2-theme/images/favicon.ico">
</head>

<body>
<button class="btn-voltar" onclick="voltarMenu()">Voltar</button>

 <div id="add-aviso-box">

  <button class="tituloAdicionar" onclick="mostrarInputs()">Adicionar Novo Aviso</button>

  <div id="novo-aviso-form">

    <textarea type="text" id="aviso-texto" placeholder="Digite o aviso..."></textarea>
    <input type="text" id="aviso-link" placeholder="Digite o link do aviso...">
    <input type="text" id="aviso-titulo" placeholder="Digite o título do aviso...">
    <input type="text" id="aviso-duracao" placeholder="Digite a duração do aviso...">
    <input type="file" id="aviso-arquivo" accept=".pdf,.png,.jpg,.jpeg,.webp">

    <button id="btn-playlist" class="btn-playlist" onclick="adicionarAviso()">Adicionar Aviso</button>

  </div>

</div>

<h2 class="titulosh2">Avisos Adicionados</h2>

<div id="lista-avisos"></div>

<div class="acoes-playlist" id="acoes-playlist">
  <button class="btn-playlist" onclick="aplicarAviso()">Aplicar Aviso</button>
  <button class="btn-delete" onclick="excluirAviso()">Deletar</button>
  <button class="btn-editar" onclick="editarAviso()">Editar</button>
</div>

<div id="tv-modal" class="modal-tv">
  <div class="modal-tv-content">
    <h2>Escolha uma TV</h2>

    <div id="lista-tvs-modal"></div>

    <button class="btn-playlist" onclick="fecharModalTV()">Cancelar</button>
  </div>
</div>
<script>

//VARIÁVEIS
let avisos = [];
let avisoEditando = null;

// TV ATUAL
const params = new URLSearchParams(window.location.search);
const tv = params.get("tv");

//ESCOLHER TVS PARA APLICAR
async function obterTVs(){

  const res = await fetch("/state");
  const state = await res.json();

  return Object.keys(state);
}

function fecharModalTV(){
  document.getElementById("tv-modal").style.display = "none";
}

async function escolherTV(){

  return new Promise(async resolve => {

    const tvs = await obterTVs();
    const lista = document.getElementById("lista-tvs-modal");

    lista.innerHTML = "";
    tvs.forEach(tv => {

      const btn = document.createElement("button");
      btn.className = "btn-tv-modal";
      btn.textContent = tv;

      btn.onclick = () => {
        fecharModalTV();
        resolve(tv);
      };
      lista.appendChild(btn);
    });

    document.getElementById("tv-modal").style.display = "flex";
  });
}

//CARREGAR AVISOS
async function carregarAvisos(){
  const res = await fetch("/avisos");
  const personalizados = await res.json();
  avisos = [...personalizados];
  renderizarAvisos();
}

//RENDERIZAR AVISOS
function renderizarAvisos(){

  const lista = document.getElementById("lista-avisos");
  lista.innerHTML="";

  avisos.forEach(aviso=>{
    let descricao="";
      if(aviso.texto){
        descricao=aviso.texto;
      }
      else if(aviso.embed){
        descricao="<b>Canva</b>";
      }
      else if(aviso.arquivo){
        if(aviso.arquivo.endsWith(".pdf")){
          descricao="<b>PDF</b>";
        }else{
          descricao="<b>Imagem</b>";
        }
      }
    
    const card=document.createElement("div");
    card.className="card-aviso";
    card.innerHTML=`

      <h3>${aviso.titulo}</h3>
      ${descricao}
      <p>Duração: ${aviso.duracao}s</p>

      <div class="acoes-card">

        <button onclick="aplicarAviso('${aviso.id}')">Aplicar</button>
        <button onclick="editarAviso('${aviso.id}')">Editar</button>
        <button onclick="excluirAviso('${aviso.id}')"> Excluir </button> 
        
      </div>
    `;
    lista.appendChild(card);
  });
}

// VERIFICAR SE AVISO JÁ EXISTE
function avisoJaExiste(novoAviso){
  return avisos.some(aviso =>
    aviso.titulo === novoAviso.titulo &&
    aviso.texto === novoAviso.texto
  );
}

//ADICIONAR AVISO
async function adicionarAviso(){
  const titulo = document.getElementById("aviso-titulo").value.trim();
  const link = document.getElementById("aviso-link").value.trim();
  const texto = document.getElementById("aviso-texto").value.trim();
  const duracao =parseInt(document.getElementById("aviso-duracao").value) || 15;
  const arquivo = document.getElementById("aviso-arquivo").files[0];

  if(!titulo){
    alert("Digite um título.");
    return;
  }
  if(!texto && !link && !arquivo){
    alert("Digite um texto, informe um link ou escolha um arquivo.");
    return;
  }
  let embed = "";

  if(link) {
    if(link.startsWith("<iframe")){
      embed = link;
    }
    else if(link.includes("canva.com")){

    embed = link;

    if(!embed.includes("embed")){
      embed += embed.includes("?")
        ? "&embed"
        : "?embed";
      }
    }else{
      embed = link;
    }
  }

  const form = new FormData();

  form.append("titulo", titulo);
  form.append("texto", texto);
  form.append("link", link);
  form.append("duracao", duracao);
  form.append("embed", embed);

  if(arquivo){
    form.append("arquivo",arquivo);
  }

  const url = avisoEditando
    ? "/avisos/" + avisoEditando
    : "/avisos";

  const metodo = avisoEditando
    ? "PUT"
    : "POST";

  await fetch(url,{
    method: metodo,
    body: form
  });

  avisoEditando = null;

  document.getElementById("aviso-titulo").value="";
  document.getElementById("aviso-texto").value="";
  document.getElementById("aviso-link").value="";
  document.getElementById("aviso-duracao").value="";
  document.getElementById("aviso-arquivo").value = "";
  carregarAvisos();
}

//EDITAR AVISO
async function editarAviso(id){
  avisoEditando = id
  const aviso =avisos.find(a=>a.id===id);

  if (!aviso) {
    return
  }

  document.getElementById("aviso-titulo").value = aviso.titulo || "";
  document.getElementById("aviso-texto").value = aviso.texto || "";
  document.getElementById("aviso-link").value = aviso.link || "";
  document.getElementById("aviso-duracao").value = aviso.duracao || 15;
  document.getElementById("novo-aviso-form").style.display="flex";

  mostrarInputs();

}

//EXCLUIR AVISO
async function excluirAviso(id){
  if(!confirm("Excluir aviso?"))
    return;

  await fetch("/avisos/"+id,{
    method:"DELETE"
  });
  carregarAvisos();
}

//APLICAR AVISO
async function aplicarAviso(id){

  const aviso = avisos.find(a=>a.id===id);
  const tv = await escolherTV();

  if(!tv)
    return;

  await fetch("/playlist/add",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      tv,
      items:[{
        tipo:"avisos",
        titulo:aviso.titulo,
        texto:aviso.texto,
        link:aviso.link,
        embed:aviso.embed,
        arquivo:aviso.arquivo,
        duracao:aviso.duracao
      }]
    })
  });

  await fetch("/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      tv,
      refresh:Date.now()
    })
  });
  alert("Aviso adicionado à playlist.");
}

// MOSTRAR INPUTS
function mostrarInputs(){

  const form = document.getElementById("novo-aviso-form");

  if(form.style.display === "flex"){
    form.style.display = "none";
  }else{
    form.style.display = "flex";
  }
}

// VOLTAR
function voltarMenu() {
  window.location.href = "/controller-tester.html";
}

// INIT
carregarAvisos();

</script>
</body>
</html>
