<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ensalamento</title>
  <link rel="stylesheet" href="style-playlists.css">
  <link rel="icon" type="image/png" href="https://www.ifsc.edu.br/o/ifsc-internet-lf6_2-theme/images/favicon.ico">
</head>
<body>

  <button class="btn-voltar" onclick="voltar()">Voltar</button>
  <h2 class="titulosplaylists">Ensalamento</h2>
  <div class="ensalamento-container">

    <div class="area-ver-ensalamento">
      <button class="btn-ver-ensalamento" onclick="verEnsalamento()">Ver ensalamento completo</button>
    </div>

    <div id="lista-ensalamentos" class="ensalamento-grid"></div>
  </div>

  <div id="tv-modal" class="modal-tv">
    <div class="modal-tv-content">
      <h2>Escolha uma TV</h2>
      <div id="lista-tvs-modal"></div>
      <button class="btn-playlist" onclick="fecharModalTV()">Cancelar</button>
    </div>
  </div>

  <div id="modal-edicao" class="modal-edicao">
    <div class="modal-edicao-content">
      <h2>Editar ensalamento</h2>
      <label for="editar-titulo">Nome</label>
      <input type="text" id="editar-titulo">
      <label for="editar-duracao"> Duração (segundos)</label>
      <input type="number" id="editar-duracao" min="1">

      <div class="acoes-edicao">
        <button class="btn-salvar-edicao" onclick="salvarEdicao()">Salvar</button>
        <button class="btn-cancelar-edicao" onclick="fecharModalEdicao()">Cancelar</button>
      </div>
    </div>
  </div>

<script>

  //CONFIGURAÇÃO
  const DIAS_ENSALAMENTO = [
    {
      id: "ensalamento-segunda",
      dia: 0,
      titulo: "Ensalamento - Segunda-feira",
      duracao: 30
    },
    {
      id: "ensalamento-terca",
      dia: 1,
      titulo: "Ensalamento - Terça-feira",
      duracao: 30
    },
    {
      id: "ensalamento-quarta",
      dia: 2,
      titulo: "Ensalamento - Quarta-feira",
      duracao: 30
    },
    {
      id: "ensalamento-quinta",
      dia: 3,
      titulo: "Ensalamento - Quinta-feira",
      duracao: 30
    },
    {
      id: "ensalamento-sexta",
      dia: 4,
      titulo: "Ensalamento - Sexta-feira",
      duracao: 30
    }
  ];

  let ensalamentos = [...DIAS_ENSALAMENTO];
  let indiceEdicao = null;


 //OBTER TVS ATIVAS
  async function obterTVs() {
    const resposta = await fetch("/state");
    const estado = await resposta.json();
    return Object.keys(estado);
  }

  //MODAL TV
  function fecharModalTV() {
    document.getElementById("tv-modal").style.display = "none";
  }

  async function escolherTV() {
    return new Promise(
      async resolve => {
        try {
          const tvs = await obterTVs();
          const lista = document.getElementById("lista-tvs-modal");
          lista.innerHTML = "";

          if (tvs.length === 0) {
            lista.innerHTML = "<p>Nenhuma TV encontrada.</p>";
            return;
          }

          tvs.forEach(
            nomeTV => {
              const botao = document.createElement("button");
              botao.className = "btn-tv-modal";
              botao.textContent = nomeTV;
              botao.onclick = () => {
                fecharModalTV();
                resolve(nomeTV);
              };

              lista.appendChild(botao);
            }
          );
          document.getElementById("tv-modal").style.display = "flex";
        } catch (erro) {
          console.error(erro);
          alert("Não foi possível carregar as TVs.");
          resolve(null);
        }
      }
    );
  }


  //RENDERIZAR CARDS
  function renderizarCards() {
    const container = document.getElementById("lista-ensalamentos");
    container.innerHTML = "";
    ensalamentos.forEach(
      (ensalamento, indice) => {

        const card = document.createElement("div");
        card.className = "card-ensalamento";

        const titulo = document.createElement("div");
        titulo.className = "titulo-card-ensalamento";
        titulo.textContent = ensalamento.titulo;

        const duracao = document.createElement("div");
        duracao.className = "duracao-card-ensalamento";
        duracao.textContent = `Duração: ${ensalamento.duracao} segundos`;

        const acoes = document.createElement("div");
        acoes.className = "acoes-card-ensalamento";

        const botaoAplicar = document.createElement("button");
        botaoAplicar.className = "btn-aplicar";
        botaoAplicar.textContent = "Aplicar";
        botaoAplicar.onclick = () => aplicarEnsalamento(ensalamento);

        const botaoEditar = document.createElement("button");
        botaoEditar.className = "btn-editar";
        botaoEditar.textContent = "Editar";
        botaoEditar.onclick = () => abrirModalEdicao(indice);

        const botaoExcluir = document.createElement("button");
        botaoExcluir.className = "btn-delete";
        botaoExcluir.textContent = "Excluir";
        botaoExcluir.onclick = () => excluirEnsalamento(indice);

        acoes.appendChild(botaoAplicar);
        acoes.appendChild(botaoEditar);
        acoes.appendChild(botaoExcluir);
        card.appendChild(titulo);
        card.appendChild(duracao);
        card.appendChild(acoes);
        container.appendChild(card);
      }
    );
  }

  // APLICAR ENSALAMENTO
  async function aplicarEnsalamento(ensalamento) {
    const tv = await escolherTV();

    if (!tv) {
      return;
    }

    const item = {
      tipo: "ensalamento",
      id: ensalamento.id,
      dia: ensalamento.dia,
      titulo: ensalamento.titulo,
      duracao: Number(ensalamento.duracao),
      src: "/playlists/verEnsalamento.html"
    };

    try {
      const resposta = await fetch("/playlist/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          tv,
          items: [item]
        })
      });

      await fetch("/update", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          tv,
          refresh: Date.now()
        })
      });

      alert(`${ensalamento.titulo} aplicado à TV ${tv}.`);

    } catch (erro) {
      console.error("Erro ao aplicar ensalamento:", erro);
      alert("Erro ao aplicar o ensalamento.");
    }
  }

  //EDITAR
  function abrirModalEdicao(indice) {
    indiceEdicao = indice;
    const ensalamento = ensalamentos[indice];
    document.getElementById("editar-titulo").value = ensalamento.titulo;
    document.getElementById("editar-duracao").value = ensalamento.duracao;
    document.getElementById("modal-edicao").style.display = "flex";
  }

  function fecharModalEdicao() {
    indiceEdicao = null;
    document.getElementById("modal-edicao").style.display = "none";
  }

  function salvarEdicao() {
    if (indiceEdicao === null) {
      return;
    }

    const novoTitulo = document.getElementById("editar-titulo").value.trim();
    const novaDuracao = Number(document.getElementById("editar-duracao").value);

    if (!novoTitulo) {
      alert("Digite um nome para o ensalamento.");
      return;
    }

    if (!novaDuracao || novaDuracao <= 0) {
      alert("Digite uma duração válida.");
      return;
    }

    ensalamentos[indiceEdicao].titulo = novoTitulo;
    ensalamentos[indiceEdicao].duracao = novaDuracao;

    fecharModalEdicao();
    renderizarCards();
  }

  //EXCLUIR
  function excluirEnsalamento(indice) {
    const ensalamento = ensalamentos[indice];
    const confirmar = confirm(`Deseja excluir "${ensalamento.titulo}"?`);

    if (!confirmar) {
      return;
    }

    ensalamentos.splice(indice, 1);
    renderizarCards();
  }


  // VER ENSALAMENTO COMPLETO
  function verEnsalamento() {
    window.location.href = "/playlists/verEnsalamento.html";
  }

  // VOLTAR
  function voltar() {
    window.location.href = "/controller-tester.html";
  }

  //INIT
  renderizarCards();

</script>
</body>
</html>
