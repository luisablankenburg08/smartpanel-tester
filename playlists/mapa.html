<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa do Campus</title>
    <link rel="stylesheet" href="style-playlists.css">
    <link rel="icon" type="image/png" href="https://www.ifsc.edu.br/o/ifsc-internet-lf6_2-theme/images/favicon.ico">
</head>
<body>

  <button class="btn-voltar" onclick="voltar()">Voltar</button>
  <h2 class="titulosplaylists"> (Floripa) </h2>


  <div class="card-mapa">
    <img id="mapa-campus" src="/playlists/mapa-floripa.jpg" alt="Mapa do Campus">

    <div class="acoes-card-mapa">
      <button class="btn-playlist" onclick="aplicarMapa()">Aplicar</button>
      <button class="btn-editar" onclick="alterarMapa()">Alterar</button>
    </div>
  </div>

<input type="file" id="arquivo-mapa" accept=".png,.jpg,.jpeg,.webp" style="display:none">

  <div id="tv-modal" class="modal-tv">
  <div class="modal-tv-content">
    <h2>Escolha uma TV</h2>
    <div id="lista-tvs-modal"></div>
    <button class="btn-playlist" onclick="fecharModalTV()">Cancelar</button>
  </div>
</div>

<script>

let params = new URLSearchParams(window.location.search);
let tv = params.get("tv");
let mapaAtual = "/playlists/mapa-floripa.jpg";

async function obterTVs(){
  const res = await fetch("/state");
  const state = await res.json();
  return Object.keys(state);
}

function fecharModalTV(){
  document.getElementById("tv-modal").style.display = "none";
}

async function escolherTV(){

  return new Promise(async resolve => {

    const tvs = await obterTVs();

    const lista =
      document.getElementById("lista-tvs-modal");

    lista.innerHTML = "";

    tvs.forEach(tv => {

      const btn =
        document.createElement("button");

      btn.className = "btn-tv-modal";
      btn.textContent = tv;

      btn.onclick = () => {
        fecharModalTV();
        resolve(tv);
      };

      lista.appendChild(btn);
    });

    document.getElementById("tv-modal").style.display =
      "flex";
  });
}

async function carregarMapa(){
  const res = await fetch("/mapa");
  const dados = await res.json();
  mapaAtual = dados.src;
  document.getElementById("mapa-campus").src = mapaAtual;
}

//APLICAR MAPA
async function aplicarMapa(){
  const tv = await escolherTV();

  if(!tv)
    return;

  const mapa = {
    tipo:"mapa",
    titulo:"Mapa do Campus",
    src: mapaAtual,
    duracao:30
  };

  await fetch("/playlist/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      tv,
      items:[mapa]
    })
  });

  await fetch("/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      tv,
      refresh:Date.now()
    })
  });
  alert("Mapa aplicado.");
}

async function alterarMapa(){
  document.getElementById("arquivo-mapa").click();
}


document.getElementById("arquivo-mapa").addEventListener("change", async function(){
const arquivo = this.files[0];

if(!arquivo)
  return;

const form = new FormData();
form.append("mapa",arquivo);

const res = await fetch("/mapa",{
  method:"POST",
  body:form
});

const dados = await res.json();
mapaAtual = dados.src;
document.getElementById("mapa-campus").src = mapaAtual;
});

async function voltar(){
  window.location.href = "/controller-tester.html"; 
}

carregarMapa();
</script>
</body>
</html>
