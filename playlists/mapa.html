<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa do Campus</title>
    <link rel="stylesheet" href="style-playlists.css">
    <link rel="icon" type="image/png" href="https://www.ifsc.edu.br/o/ifsc-internet-lf6_2-theme/images/favicon.ico">
</head>
<body>
  <button class="btn-voltar" onclick="voltarMenu()">Voltar</button>
  <h2 class="titulosplaylists"> Mapa do Campus (Floripa) </h2>

  <img
    src="/playlists/mapa-floripa.jpg"
    id="mapa-campus"
    alt="Mapa do Campus"
  >

  <div class="acoes-playlist">

    <button
      class="btn-playlist"
      onclick="salvarMapa()"
    >
      Aplicar Mapa
    </button>

    <button
      class="btn-playlist destaque"
      onclick="aplicarTodas()"
    >
      Aplicar em todas as telas
    </button>

  </div>

  <div id="tv-modal" class="modal-tv">
  <div class="modal-tv-content">

    <h2>Escolha uma TV</h2>

    <div id="lista-tvs-modal"></div>

    <button
      class="btn-playlist"
      onclick="fecharModalTV()">
      Cancelar
    </button>

  </div>
</div>

<script>

let params = new URLSearchParams(window.location.search);

let tv = params.get("tv");

async function obterTVs(){
  const res = await fetch("/state");
  const state = await res.json();
  return Object.keys(state);
}

function fecharModalTV(){
  document.getElementById("tv-modal").style.display = "none";
}

async function escolherTV(){

  return new Promise(async resolve => {

    const tvs = await obterTVs();

    const lista =
      document.getElementById("lista-tvs-modal");

    lista.innerHTML = "";

    tvs.forEach(tv => {

      const btn =
        document.createElement("button");

      btn.className = "btn-tv-modal";
      btn.textContent = tv;

      btn.onclick = () => {
        fecharModalTV();
        resolve(tv);
      };

      lista.appendChild(btn);
    });

    document.getElementById("tv-modal").style.display =
      "flex";
  });
}

function voltarMenu() {
  window.location.href = "/controller-tester.html"; }

async function aplicarTodas(){

  let playlist = [
    {
      tipo: "mapa",
      titulo: "Mapa do Campus",
      src: "/playlists/mapa-floripa.jpg",
      duracao: 30
    }
  ];

  await fetch("/update-all", {

    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
    pagina: "playlist",
    intervalo: 30,
    items: playlist
  })
  });
  alert("Mapa aplicado em todas as TVs");
  window.location.href = "/controller-tester.html";
}


async function salvarMapa() {

  const res = await fetch("/state");
  const state = await res.json();

  const tvs = Object.keys(state);

  if(tvs.length === 0){
    alert("Nenhuma TV conectada");
    return;
  }

  const escolhida = await escolherTV();

  if(!escolhida){
    return;
  }

  let playlist = [{
    tipo:"mapa",
    titulo:"Mapa do Campus",
    src:"/playlists/mapa-floripa.jpg",
    duracao:30
  }];

  await fetch("/playlist/add",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      tv:escolhida,
      items:playlist
    })
  });

  alert("Mapa enviado para " + escolhida);
  window.location.href = "/controller-tester.html";
}


</script>

</body>
</html>
