<!DOCTYPE html>
<html lang="pt-br">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vídeos</title>
  <link rel="stylesheet" href="/playlists/style-playlists.css">
  <link rel="icon" type="image/png" href="https://www.ifsc.edu.br/o/ifsc-internet-lf6_2-theme/images/favicon.ico">
</head>

<body>
<button class="btn-voltar" onclick="voltarMenu()">Voltar</button>

 <div id="add-video-box">

  <button class="tituloAdicionar" onclick="mostrarInputs()">Adicionar Novo Vídeo</button>

  <div id="novo-video-form">

    <input type="text" id="youtube-url" placeholder="Cole a URL do YouTube aqui...">
    <input type="text" id="youtube-titulo" placeholder="Digite o título do vídeo...">
    <button id="btn-playlist" class="btn-playlist" onclick="adicionarVideo()">Adicionar Vídeo</button>

  </div>

</div>

<h2 class="titulosh2">Vídeos Adicionados</h2>

<div id="lista-videos"></div>

<div class="acoes-playlist" id="acoes-playlist">
  <button class="btn-playlist" onclick="aplicarPlaylist()">Aplicar Playlist</button>
  <button class="btn-playlist" onclick="aplicarTodas()">Aplicar em todas as telas</button>
  <button class="btn-delete" onclick="deletar()">Deletar</button>
  <button class="btn-editar" onclick="editar()">Editar</button>
</div>

<div id="tv-modal" class="modal-tv">
  <div class="modal-tv-content">
    <h2>Escolha uma TV</h2>

    <div id="lista-tvs-modal"></div>

    <button class="btn-playlist" onclick="fecharModalTV()">Cancelar</button>
  </div>
</div>

<script>

// VARIÁVEIS
let videosDisponiveis = [];
let playlist = [];

//========================
// TV ATUAL
//========================
const params = new URLSearchParams(window.location.search);
const tv = params.get("tv");

async function obterTVs(){

  const res = await fetch("/state");
  const state = await res.json();

  return Object.keys(state);
}

function fecharModalTV(){
  document.getElementById("tv-modal").style.display = "none";
}

async function escolherTV(){

  return new Promise(async resolve => {

    const tvs = await obterTVs();

    const lista = document.getElementById("lista-tvs-modal");

    lista.innerHTML = "";

    tvs.forEach(tv => {

      const btn = document.createElement("button");

      btn.className = "btn-tv-modal";
      btn.textContent = tv;

      btn.onclick = () => {
        fecharModalTV();
        resolve(tv);
      };
       mostrarAcoesPlaylist(); 
      lista.appendChild(btn);

    });

    document.getElementById("tv-modal").style.display = "flex";
  });

}

// EXTRAIR ID
function extrairVideoId(url) {
  try {
    let parsedUrl = new URL(url);

    if (parsedUrl.searchParams.get("v")) {
      return parsedUrl.searchParams.get("v");
    }

    if (parsedUrl.hostname.includes("youtu.be")) {
      return parsedUrl.pathname.slice(1);
    }

    if (parsedUrl.pathname.includes("/embed/")) {
      return parsedUrl.pathname.split("/embed/")[1]?.split("?")[0];
    }

    if (parsedUrl.pathname.includes("/live/")) {
      return parsedUrl.pathname.split("/live/")[1]?.split("?")[0];
    }

  } catch {
    return null;
  }

  return null;
}

//========================
// DETECTAR LIVESTREAM
//========================
function ehLivestream(url) {
  if (!url) return false;
  
  try {
    let parsedUrl = new URL(url);
    // YouTube live: /live/ ou /watch?v=xxxxx (precisa ser validado por API)
    return parsedUrl.pathname.includes("/live/") || 
           url.includes("youtube.com/live/");
  } catch {
    return false;
  }
}

function extrairIdDoIframe(iframe) {
  try {
    let url = new URL(iframe);
    
    // Para embed: /embed/ID?...
    if (url.pathname.includes("/embed/")) {
      return url.pathname.split("/embed/")[1]?.split("?")[0];
    }
    
    // Para watch (livestream): /watch?v=ID
    if (url.pathname.includes("/watch")) {
      return url.searchParams.get("v");
    }
    
    return null;
  } catch {
    return null;
  }
}

// CARREGAR VÍDEOS
async function carregarVideos(){

  const fixos = [];

  try {
    const res = await fetch("/playlist?type=videos");
    let dinamicos = [];

    if(res.ok){
      dinamicos = await res.json();
    }

    videosDisponiveis = [...fixos, ...dinamicos];

  } catch (e) {
    console.error("Erro ao carregar vídeos:", e);
    videosDisponiveis = fixos;
  }

  renderVideos();
}

// RENDERIZAR
function renderVideos(){

  const lista = document.getElementById("lista-videos");
  lista.innerHTML = "";

  videosDisponiveis.forEach(video => {

    let videoId = video.id || extrairIdDoIframe(video.iframe);
    
    let card = document.createElement("div");
    card.className = "video-card";

    let jaSelecionado = playlist.find(v =>
      (v.id || extrairIdDoIframe(v.iframe)) === videoId
    );

    if(jaSelecionado){
      card.classList.add("video-selecionado");
    }

    card.innerHTML = `
      ${video.live ? '<div class="live-badge">AO VIVO</div>' : ''}
      <img src="${video.thumb}" class="video-thumb">
      <div class="video-info">
        <h3>${video.titulo}</h3>
        <p>Duração: ${video.duracao ? video.duracao + "s" : "Desconhecida"}</p>
        <button class="selecionar-btn">
          ${jaSelecionado ? "Selecionado" : "Selecionar"}
        </button>
      </div>
    `;

    let btn = card.querySelector(".selecionar-btn");

    btn.onclick = (e) => {
      e.stopPropagation();

      let existe = playlist.find(v => (v.id || extrairIdDoIframe(v.iframe)) === videoId );

      if(existe){
        playlist = playlist.filter(v => (v.id || extrairIdDoIframe(v.iframe)) !== videoId );
        card.classList.remove("video-selecionado");
        btn.innerText = "Selecionar";

      }else{
        playlist.push(video);
        card.classList.add("video-selecionado");
        btn.innerText = "Selecionado";
      }
      mostrarAcoesPlaylist(); 
    };
    
    lista.appendChild(card);
  });
  mostrarAcoesPlaylist(); 
}

// ADICIONAR VÍDEO
async function adicionarVideo(){

  const url = document.getElementById("youtube-url").value.trim();
  const titulo = document.getElementById("youtube-titulo").value.trim();

  if (!url) {
    alert("Cole uma URL válida");
    return;
  }

  if (!titulo) {
    alert("Digite um título");
    return;
  }

  const videoId = extrairVideoId(url);

  if (!videoId) {
    alert("URL inválida");
    return;
  }

  let jaExiste = videosDisponiveis.find(v =>
    (v.id || extrairIdDoIframe(v.iframe)) === videoId
  );

  if (jaExiste) {
    alert("Esse vídeo já existe");
    return;
  }

  // Detectar livestream
  const isLive = ehLivestream(url);

  // Livestreams e vídeos normais usam /embed/ (funciona para ambos)
  let iframe = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&playsinline=1`;

  let thumb = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

  const novoVideo = {
    id: videoId,
    titulo,
    iframe,
    thumb
  };

  const res = await fetch("/videos", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(novoVideo)
  });

  if(!res.ok){
    alert("Erro ao salvar vídeo");
    return;
  }
  document.getElementById("youtube-url").value = "";
  document.getElementById("youtube-titulo").value = "";
  carregarVideos();
}

// MOSTRAR BOTÕES
function mostrarAcoesPlaylist(){

  const acoes = document.getElementById("acoes-playlist");

  if(playlist.length > 0){
      acoes.style.display = "flex";
  }else{
      acoes.style.display = "none";
  }
}

// MOSTRAR INPUTS
function mostrarInputs(){

  const form = document.getElementById("novo-video-form");

  if(form.style.display === "flex"){
    form.style.display = "none";
  }else{
    form.style.display = "flex";
  }
}

// APLICAR/SALVAR PLAYLIST
async function aplicarPlaylist(){

  if(playlist.length === 0){
    alert("Selecione ao menos um vídeo");
    return;
  }

  const tv = await escolherTV();

  if(!tv){
    return;
  }

  await fetch("/playlist/add",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      tv,
      items: playlist.map(video => ({
        tipo:"video",
        ...video
      }))
    })
  });

  alert(`Vídeos adicionados à playlist da ${tv}`);

  window.location.href = "/controller-tester.html";
  playlist = [];
  renderVideos();
}

// APLICAR EM TODAS
async function aplicarTodas(){

  if(playlist.length === 0){
    alert("Selecione ao menos um vídeo");
    return;
  }

  const tvs = await obterTVs();

  for(const tv of tvs){
    await fetch("/playlist/add",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        tv,
        items: playlist.map(video => ({
          tipo:"video",
          ...video
        }))
      })
    });
  }

  alert("Vídeos adicionados às playlists de todas as TVs");
  playlist = [];
  renderVideos();
}

// DELETAR
async function deletar() {

  if (playlist.length === 0) {
    alert("Selecione um vídeo para excluir.");
    return;
  }

  if (playlist.length > 1) {
    alert("Selecione apenas um vídeo para excluir.");
    return;
  }

  const video = playlist[0];
  const id = video.id || extrairIdDoIframe(video.iframe);
  const confirmar = confirm(`Deseja realmente excluir "${video.titulo}"?`);
  if (!confirmar) return;

  try {
    const res = await fetch(`/videos/${id}`, {method: "DELETE"});

    if (!res.ok) {
      alert("Erro ao excluir o vídeo.");
      return;
    }

    videosDisponiveis = videosDisponiveis.filter(v => (v.id || extrairIdDoIframe(v.iframe)) !== id);

    playlist = [];
    renderVideos();
    alert("Vídeo removido com sucesso.");

  } catch (erro) {
    console.error(erro);
    alert("Erro ao excluir o vídeo.");
  }

}

// SALVAR EDIÇÃO
async function salvarEdicao(video){

  await fetch(`/videos/${video.id}`,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        titulo: video.titulo,
        duracao: video.duracao
      })
  });

}

// EDITAR
async function editar() {

    if (playlist.length === 0) {
      alert("Selecione um vídeo para editar.");
      return;
    }

    if (playlist.length > 1) {
      alert("Selecione apenas um vídeo para editar.");
      return;
    }

    const video = playlist[0];

    const novoTitulo = prompt("Novo título do vídeo:", video.titulo);

    if(novoTitulo === null) return;

    video.titulo = novoTitulo.trim();
    
    await salvarEdicao(video);

    renderVideos();
}

// VOLTAR
function voltarMenu() {
  window.location.href = "/controller-tester.html";
}

// INIT
carregarVideos();

</script>

</body>
</html>
